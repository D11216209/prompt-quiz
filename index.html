// 自動切分 4 組
const part1 = allQuestions.slice(0, 50);
const part2 = allQuestions.slice(50, 100);
const part3 = allQuestions.slice(100, 150);
const part4 = allQuestions.slice(150, 200);

let quizData = [];
let currentIndex = 0;
let score = 0;

// 初始化歷史紀錄
updateHistory();

function startQuiz(mode) {
    if(mode === 'part1') quizData = [...part1];
    else if(mode === 'part2') quizData = [...part2];
    else if(mode === 'part3') quizData = [...part3];
    else if(mode === 'part4') quizData = [...part4];
    else quizData = [...allQuestions];
    
    // Fisher-Yates Shuffle (洗牌)
    for (let i = quizData.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
    }
    
    currentIndex = 0;
    score = 0;
    renderQuiz();
}

// 3. 渲染題目
function renderQuiz() {
    let q = quizData[currentIndex];
    document.getElementById('mainCard').innerHTML = `
        <div style="color:gray; margin-bottom:10px;">題目 ${currentIndex + 1} / ${quizData.length}</div>
        <h2>${q.q}</h2>
        <div id="opts"></div>
        <div style="margin-top:30px; border-top: 1px solid #444; padding-top:20px;">
            <button onclick="if(confirm('確定要提早交卷嗎？')) finishQuiz()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">提早交卷</button>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; margin-left:15px; cursor:pointer;">返回主選單</button>
        </div>
    `;
    
    q.opts.forEach((opt, i) => {
        let btn = document.createElement('button');
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => {
            if(i === q.ans) { btn.classList.add('correct'); score += 1; }
            else { btn.classList.add('wrong'); document.querySelectorAll('.option')[q.ans].classList.add('correct'); }
            setTimeout(() => {
                currentIndex++;
                if(currentIndex < quizData.length) renderQuiz();
                else finishQuiz();
            }, 800);
        };
        document.getElementById('opts').appendChild(btn);
    });
}

// 4. 結束測驗
function finishQuiz() {
    let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
    history.unshift({ score: score, total: quizData.length, date: new Date().toLocaleDateString() });
    localStorage.setItem('quizHistory', JSON.stringify(history.slice(0, 5)));
    
    document.getElementById('mainCard').innerHTML = `
        <h2>測驗完成</h2>
        <div style="font-size:40px; margin:20px 0;">得分: ${score} / ${quizData.length}</div>
        <button class="btn-mode" onclick="location.reload()">重新開始</button>
    `;
    updateHistory();
}

// 5. 更新紀錄
function updateHistory() {
    let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
    document.getElementById('historyList').innerHTML = history.map(h => 
        `<div style="margin-bottom:5px;">📅 ${h.date} - ${h.score}/${h.total} 分</div>`
    ).join('');
}
</script>
